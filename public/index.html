<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogrametria 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .upload-subtext {
            color: #999;
            font-size: 13px;
        }

        input[type="file"] {
            display: none;
        }

        .file-list {
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            background: #f5f5f5;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .file-item-name {
            color: #333;
            flex: 1;
            word-break: break-all;
        }

        .file-item-remove {
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        .file-item-remove:hover {
            color: #c0392b;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #ecf0f1;
            color: #333;
        }

        .btn-clear:hover {
            background: #bdc3c7;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .status.show {
            display: block;
        }

        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
            border: 1px solid #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            border: 1px solid #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #c62828;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #ecf0f1;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .file-count {
            color: #666;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            border: 1px solid #388e3c;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-title {
            color: #388e3c;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .result-text {
            color: #2e7d32;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Fotogrametria 3D</h1>
        <p class="subtitle">Converta suas fotos em modelo 3D</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">Clique ou arraste fotos aqui</div>
            <div class="upload-subtext">Mínimo 10 fotos, máximo 30</div>
            <input type="file" id="fileInput" multiple accept="image/*">
        </div>

        <div class="file-count" id="fileCount"></div>

        <div class="file-list" id="fileList"></div>

        <div class="button-group">
            <button class="btn-upload" id="uploadBtn" disabled>Enviar Fotos</button>
            <button class="btn-clear" id="clearBtn">Limpar</button>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="status" id="status"></div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const fileCount = document.getElementById('fileCount');
        const uploadBtn = document.getElementById('uploadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const result = document.getElementById('result');

        let selectedFiles = [];

        // MUDE ISSO PARA O URL DO SEU SERVIDOR NO RENDER
        const API_URL = 'https://dashboard.render.com/project/prj-d8tjcl8js32c73bq7b60

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(file => file.type.startsWith('image/'));

            if (selectedFiles.length > 30) {
                selectedFiles = selectedFiles.slice(0, 30);
                showStatus('Máximo 30 fotos. As primeiras 30 foram selecionadas.', 'error');
            }

            updateFileList();
        }

        function updateFileList() {
            fileList.innerHTML = '';
            fileCount.textContent = `${selectedFiles.length} foto(s) selecionada(s)`;

            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span class="file-item-name">${file.name}</span>
                    <span class="file-item-remove" onclick="removeFile(${index})">✕</span>
                `;
                fileList.appendChild(fileItem);
            });

            uploadBtn.disabled = selectedFiles.length < 10;

            if (selectedFiles.length < 10) {
                uploadBtn.textContent = `Enviar Fotos (${selectedFiles.length}/10)`;
            } else {
                uploadBtn.textContent = 'Enviar Fotos';
            }
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            fileInput.value = '';
            fileList.innerHTML = '';
            fileCount.textContent = '';
            status.classList.remove('show');
            progressBar.classList.remove('show');
            result.classList.remove('show');
            updateFileList();
        });

        uploadBtn.addEventListener('click', uploadFiles);

        async function uploadFiles() {
            if (selectedFiles.length < 10) {
                showStatus('Selecione no mínimo 10 fotos!', 'error');
                return;
            }

            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('photos', file);
            });

            uploadBtn.disabled = true;
            showStatus('ENVIANDO FOTOS...', 'loading');
            progressBar.classList.add('show');
            result.classList.remove('show');

            try {
                const response = await fetch(`${API_URL}/process-photos`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Erro ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                progressFill.style.width = '100%';
                showStatus('✓ Modelo 3D gerado com sucesso!', 'success');

                result.classList.add('show');
                result.innerHTML = `
                    <div class="result-title">✓ Sucesso!</div>
                    <div class="result-text">
                        <strong>${data.photosReceived}</strong> fotos processadas<br>
                        Seu modelo 3D está pronto!
                    </div>
                `;

                setTimeout(() => {
                    clearBtn.click();
                }, 3000);

            } catch (error) {
                console.error('Erro:', error);
                showStatus(`❌ Erro: ${error.message}`, 'error');
            } finally {
                uploadBtn.disabled = false;
                progressBar.classList.remove('show');
                progressFill.style.width = '0%';
            }
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
        }
    </script>
</body>
</html>
